<!DOCTYPE html>
<!--
  SCRAWL — a camera mirror that draws you as a scribble portrait.
  Single file. Everything runs on-device; only the face model is
  fetched from CDN on first open (then cached by the browser).

  Run: open this file in Chrome (or any Chromium browser / Safari).
  If your browser refuses camera access on file://, serve locally:
      python3 -m http.server
  and open http://localhost:8000/scrawl.html
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Scrawl</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M12 44c6-18 22-30 26-24s-16 14-12 20 22-16 26-10-20 18-16 24' fill='none' stroke='%231B1713' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  :root{
    --paper:#F5EFE3;
    --ink:#1B1713;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%; overflow:hidden; background:var(--paper);
    touch-action:none; overscroll-behavior:none;
    font-family:"Futura","Avenir Next","Century Gothic",system-ui,sans-serif;
  }
  #stage{ position:fixed; inset:0; width:100%; height:100%; display:block; }
  video{ position:fixed; width:2px; height:2px; opacity:0; pointer-events:none; }

  /* quiet status / error line */
  #msg{
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
    max-width:min(78vw,460px); text-align:center;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    line-height:2; color:var(--ink); opacity:0; transition:opacity .8s ease;
    pointer-events:none; white-space:pre-line;
  }
  #msg.show{ opacity:.55; }

  /* the pill */
  #pill{
    position:fixed; left:50%; bottom:calc(18px + env(safe-area-inset-bottom));
    transform:translate(-50%, 14px);
    display:flex; align-items:center; gap:14px;
    padding:10px 16px; border-radius:999px;
    background:color-mix(in srgb, var(--paper) 88%, transparent);
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    border:1px solid color-mix(in srgb, var(--ink) 14%, transparent);
    box-shadow:0 6px 24px color-mix(in srgb, var(--ink) 10%, transparent);
    opacity:0; pointer-events:none;
    transition:opacity .6s ease, transform .6s cubic-bezier(.2,.7,.2,1);
  }
  #pill.show{ opacity:1; pointer-events:auto; transform:translate(-50%,0); }

  .dots{ display:flex; gap:9px; align-items:center; }
  .dot{
    width:21px; height:21px; border-radius:50%; cursor:pointer;
    border:1px solid color-mix(in srgb, var(--ink) 28%, transparent);
    display:grid; place-items:center; padding:0; background:var(--dp);
    transition:transform .15s ease;
  }
  .dot::after{
    content:""; width:9px; height:9px; border-radius:50%; background:var(--di);
  }
  .dot:hover{ transform:scale(1.12); }
  .dot[aria-pressed="true"]{
    outline:1.5px solid var(--ink); outline-offset:2.5px;
  }
  .sep{
    width:1px; height:18px;
    background:color-mix(in srgb, var(--ink) 16%, transparent);
  }
  .btn{
    appearance:none; background:none; border:none; cursor:pointer;
    font:inherit; font-size:10.5px; font-weight:600;
    letter-spacing:.17em; text-transform:uppercase;
    color:color-mix(in srgb, var(--ink) 74%, transparent);
    padding:6px 4px; transition:color .15s ease;
  }
  .btn:hover{ color:var(--ink); }
  .dot:focus-visible,.btn:focus-visible{
    outline:2px solid var(--ink); outline-offset:3px; border-radius:6px;
  }
  @media (max-width:420px){
    #pill{ gap:10px; padding:9px 13px; }
    .dots{ gap:7px; }
    .dot{ width:19px; height:19px; }
  }
</style>
</head>
<body>
<canvas id="stage" role="img" aria-label="Your scribble portrait"></canvas>
<video id="cam" playsinline muted autoplay></video>
<div id="msg" aria-live="polite"></div>
<div id="pill" aria-hidden="true">
  <div class="dots" id="dots"></div>
  <div class="sep"></div>
  <button class="btn" id="save">Save</button>
  <button class="btn" id="clear">Clear</button>
</div>

<script type="module">
/* ============================================================
   0. CONFIG
============================================================ */
const PALETTES = [
  { name:'Gallery',  paper:'#F5EFE3', ink:'#1B1713' },
  { name:'Graphite', paper:'#E6E4DF', ink:'#26241F' },
  { name:'Sepia',    paper:'#F3E7CF', ink:'#4A2E1B' },
  { name:'Oxblood',  paper:'#F2E3DC', ink:'#4A1F27' },
  { name:'Noir',     paper:'#14131A', ink:'#EAE6DA' },
  { name:'Indigo',   paper:'#17233B', ink:'#DCE8F4' },
];
const Q = new URLSearchParams(location.search);
const DEBUG   = Q.has('debug');
const INSTANT = Q.has('instant');
const SEEDQ   = Q.has('seed') ? +Q.get('seed') : (DEBUG ? 7 : (Date.now() & 0xffff));

const STEADY_MS   = 700;    // face must hold this long
const MIN_FACE_H  = 0.20;   // of frame height
const REARM_MS    = 1500;   // cooldown after Clear
const GRID_LONG   = 224;    // work-grid long side
const REF_MIN     = 1080;   // reference canvas min-dim for widths

/* ============================================================
   1. UTILS
============================================================ */
let _s = SEEDQ >>> 0;
function rnd(){ _s|=0; _s=_s+0x6D2B79F5|0; let t=Math.imul(_s^_s>>>15,1|_s);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }
const rr   = (a,b)=>a+rnd()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp =(a,b,t)=>a+(b-a)*t;
const sstep=(a,b,x)=>{ const t=clamp((x-a)/(b-a),0,1); return t*t*(3-2*t); };
const TAU  = Math.PI*2;

function hexRgb(h){ const n=parseInt(h.slice(1),16);
  return [n>>16&255, n>>8&255, n&255]; }
function rgba(h,a){ const [r,g,b]=hexRgb(h); return `rgba(${r},${g},${b},${a})`; }

// small value-noise (hash grid, bilinear)
function hash2(x,y,s){ let h=(x*374761393 + y*668265263 + s*1442695041)|0;
  h=(h^(h>>>13))|0; h=Math.imul(h,1274126177); return ((h^(h>>>16))>>>0)/4294967296; }
function vnoise(x,y,s=0){
  const xi=Math.floor(x), yi=Math.floor(y), xf=x-xi, yf=y-yi;
  const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf);
  return lerp(lerp(hash2(xi,yi,s),hash2(xi+1,yi,s),u),
              lerp(hash2(xi,yi+1,s),hash2(xi+1,yi+1,s),u), v);
}

function boxBlur(src, w, h, r, passes=1){
  let a = src, b = new Float32Array(w*h);
  for(let p=0;p<passes;p++){
    // horizontal
    for(let y=0;y<h;y++){ let acc=0; const row=y*w;
      for(let x=-r;x<=r;x++) acc+=a[row+clamp(x,0,w-1)];
      for(let x=0;x<w;x++){ b[row+x]=acc/(2*r+1);
        acc+=a[row+clamp(x+r+1,0,w-1)]-a[row+clamp(x-r,0,w-1)]; } }
    // vertical
    for(let x=0;x<w;x++){ let acc=0;
      for(let y=-r;y<=r;y++) acc+=b[clamp(y,0,h-1)*w+x];
      for(let y=0;y<h;y++){ a[y*w+x]=acc/(2*r+1);
        acc+=b[clamp(y+r+1,0,h-1)*w+x]-b[clamp(y-r,0,h-1)*w+x]; } }
  }
  return a;
}

function bilin(grid, w, h, x, y){
  x=clamp(x,0,w-1.001); y=clamp(y,0,h-1.001);
  const xi=x|0, yi=y|0, xf=x-xi, yf=y-yi, i=yi*w+xi;
  return lerp(lerp(grid[i],grid[i+1],xf), lerp(grid[i+w],grid[i+w+1],xf), yf);
}

/* ============================================================
   2. LANDMARK INDEX SETS (MediaPipe FaceLandmarker, 478 pts)
============================================================ */
const IDX = {
  oval:[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,
        377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109],
  eyeR:[33,246,161,160,159,158,157,173,133,155,154,153,145,144,163,7],
  eyeL:[263,466,388,387,386,385,384,398,362,382,381,380,374,373,390,249],
  lidR:[33,246,161,160,159,158,157,173,133],
  lidL:[263,466,388,387,386,385,384,398,362],
  browR:[70,63,105,66,107], browL:[300,293,334,296,336],
  lipU:[78,191,80,81,82,13,312,311,310,415,308],
  lipD:[78,95,88,178,87,14,317,402,318,324,308],
  irisR:468, irisRing:[469,470,471,472],
  irisL:473, irisRingL:[474,475,476,477],
  underLip:17, noseBase:2, nostrilR:98, nostrilL:327,
};

/* ============================================================
   3. DOM + STATE
============================================================ */
const stage = document.getElementById('stage');
const sctx  = stage.getContext('2d');
const video = document.getElementById('cam');
const msgEl = document.getElementById('msg');
const pill  = document.getElementById('pill');
const dotsEl= document.getElementById('dots');

let pal = PALETTES[clamp(PALETTES.findIndex(p=>p.name===Q.get('palette')),0,PALETTES.length-1)];
if(!pal || pal.name===undefined) pal = PALETTES[0];

let dpr=1, W=0, H=0;                 // display backing size
let paperCv=null;                    // display-size paper cache
let state='boot';                    // boot|watch|generating|drawing|done|error
let landmarker=null, watchTimer=0, steadySince=0, lastDet=0;
let hist=[];                         // steadiness window
let art=null;                        // { strokes, W, H, totalLen, headC, headR }
let inkCv=null, inkCtx=null;         // art-size ink layer
let anim=null;                       // animation cursor
let rearmAt=0;
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPalette(p){
  pal=p;
  document.documentElement.style.setProperty('--paper',p.paper);
  document.documentElement.style.setProperty('--ink',p.ink);
  buildPaper();
  if(art){ reink(); composite(); }
  else composite();
  for(const b of dotsEl.children)
    b.setAttribute('aria-pressed', b.dataset.name===p.name ? 'true':'false');
}

function msg(t){ msgEl.textContent=t||''; msgEl.classList.toggle('show', !!t); }

/* ============================================================
   4. PAPER
============================================================ */
let grainTile=null;
function makeGrain(){
  const s=192, c=document.createElement('canvas'); c.width=c.height=s;
  const x=c.getContext('2d'), im=x.createImageData(s,s), d=im.data;
  for(let i=0;i<s*s;i++){
    const gx=i%s, gy=(i/s)|0;
    let v = vnoise(gx/2.6,gy/2.6,11)*.55 + vnoise(gx/9,gy/9,23)*.45;
    v += (hash2(gx,gy,5)-.5)*.5;                    // tooth speckle
    const g = clamp(128 + (v-.5)*255, 0, 255);
    d[i*4]=d[i*4+1]=d[i*4+2]=g; d[i*4+3]=255;
  }
  x.putImageData(im,0,0);
  return c;
}
function buildPaper(){
  paperCv = paperCv || document.createElement('canvas');
  paperCv.width=W; paperCv.height=H;
  const x=paperCv.getContext('2d');
  x.fillStyle=pal.paper; x.fillRect(0,0,W,H);
  grainTile = grainTile || makeGrain();
  const pat=x.createPattern(grainTile,'repeat');
  x.save();
  x.globalCompositeOperation='multiply'; x.globalAlpha=.055;
  x.fillStyle=pat; x.fillRect(0,0,W,H);
  x.globalCompositeOperation='screen';   x.globalAlpha=.05;
  x.fillRect(0,0,W,H);
  x.restore();
  // gentle vignette
  const g=x.createRadialGradient(W/2,H*.46,Math.min(W,H)*.42, W/2,H*.5,Math.hypot(W,H)*.62);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1, rgba(pal.ink,.07));
  x.fillStyle=g; x.fillRect(0,0,W,H);
}

function resize(){
  dpr=Math.min(devicePixelRatio||1,2);
  const cw=innerWidth, ch=innerHeight;
  W=Math.round(cw*dpr); H=Math.round(ch*dpr);
  stage.width=W; stage.height=H;
  stage.style.width=cw+'px'; stage.style.height=ch+'px';
  buildPaper(); composite();
}
addEventListener('resize', resize);

/* ============================================================
   5. COMPOSITE (paper + ink + pen tip)
============================================================ */
function artTransform(){
  // fit art into current display, centered
  const s=Math.min(W/art.W, H/art.H);
  return { s, ox:(W-art.W*s)/2, oy:(H-art.H*s)/2 };
}
function composite(tip){
  sctx.clearRect(0,0,W,H);
  if(paperCv && paperCv.width) sctx.drawImage(paperCv,0,0);
  if(art && inkCv){
    const {s,ox,oy}=artTransform();
    sctx.drawImage(inkCv, ox,oy, art.W*s, art.H*s);
    if(tip){
      sctx.beginPath();
      sctx.arc(ox+tip.x*s, oy+tip.y*s, Math.max(2, 1.7*(Math.min(W,H)/REF_MIN)*dpr+1), 0, TAU);
      sctx.fillStyle=rgba(pal.ink,.9); sctx.fill();
    }
  }
}

/* ============================================================
   6. FIELD — luminance, flow, masks, target darkness
============================================================ */
function buildField(cap){
  // cap: { cv (mirrored frame), cw, ch, lm(i)->{x,y} normalized }
  const L=cap.lm;
  // face oval bbox in frame px
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(const i of IDX.oval){ const p=L(i);
    minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x);
    minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y); }
  const fx=minX*cap.cw, fy=minY*cap.ch,
        fw=(maxX-minX)*cap.cw, fh=(maxY-minY)*cap.ch;

  // crop: generous room for hair / neck / shoulders
  const cx0=clamp(fx-0.85*fw,0,cap.cw), cy0=clamp(fy-1.05*fh,0,cap.ch);
  const cx1=clamp(fx+fw+0.85*fw,0,cap.cw), cy1=clamp(fy+fh+1.05*fh,0,cap.ch);
  const cw=cx1-cx0, ch=cy1-cy0;

  const gs=GRID_LONG/Math.max(cw,ch);
  const gw=Math.max(32,Math.round(cw*gs)), gh=Math.max(32,Math.round(ch*gs));

  // sample pixels
  const tmp=document.createElement('canvas'); tmp.width=gw; tmp.height=gh;
  const tx=tmp.getContext('2d',{willReadFrequently:true});
  tx.drawImage(cap.cv, cx0,cy0,cw,ch, 0,0,gw,gh);
  const px=tx.getImageData(0,0,gw,gh).data;
  const N=gw*gh;
  const lum=new Float32Array(N), R=new Float32Array(N),
        G=new Float32Array(N), B=new Float32Array(N);
  for(let i=0;i<N;i++){ const r=px[i*4]/255,g=px[i*4+1]/255,b=px[i*4+2]/255;
    R[i]=r;G[i]=g;B[i]=b; lum[i]=0.299*r+0.587*g+0.114*b; }

  // helpers: frame<->grid
  const f2g=(nx,ny)=>({ x:(nx*cap.cw-cx0)*gs, y:(ny*cap.ch-cy0)*gs });
  const g2f=(gx,gy)=>({ x:cx0+gx/gs, y:cy0+gy/gs });
  const Lg=i=>{ const p=L(i); return f2g(p.x,p.y); };

  // --- background estimate from crop border (top+sides) ---
  let br=[],bg=[],bb=[];
  const push=i=>{br.push(R[i]);bg.push(G[i]);bb.push(B[i]);};
  for(let x=0;x<gw;x++){ push(x); push(gw+x); }
  for(let y=0;y<Math.floor(gh*0.72);y++){ push(y*gw); push(y*gw+1); push(y*gw+gw-1); push(y*gw+gw-2); }
  const med=a=>{a.sort((p,q)=>p-q);return a[a.length>>1];};
  const bgc=[med(br),med(bg),med(bb)];

  // --- structure tensor flow ---
  const lb=boxBlur(Float32Array.from(lum),gw,gh,1,1);
  const gxA=new Float32Array(N), gyA=new Float32Array(N), mag=new Float32Array(N);
  for(let y=1;y<gh-1;y++)for(let x=1;x<gw-1;x++){
    const i=y*gw+x;
    const gx=(lb[i+1]-lb[i-1])*.5 + (lb[i-gw+1]-lb[i-gw-1])*.25 + (lb[i+gw+1]-lb[i+gw-1])*.25;
    const gy=(lb[i+gw]-lb[i-gw])*.5 + (lb[i+gw-1]-lb[i-gw-1])*.25 + (lb[i+gw+1]-lb[i-gw+1])*.25;
    gxA[i]=gx; gyA[i]=gy; mag[i]=Math.hypot(gx,gy);
  }
  let jxx=new Float32Array(N), jyy=new Float32Array(N), jxy=new Float32Array(N);
  for(let i=0;i<N;i++){ jxx[i]=gxA[i]*gxA[i]; jyy[i]=gyA[i]*gyA[i]; jxy[i]=gxA[i]*gyA[i]; }
  jxx=boxBlur(jxx,gw,gh,2,2); jyy=boxBlur(jyy,gw,gh,2,2); jxy=boxBlur(jxy,gw,gh,2,2);
  const theta=new Float32Array(N), coh=new Float32Array(N);
  for(let i=0;i<N;i++){
    theta[i]=0.5*Math.atan2(2*jxy[i], jxx[i]-jyy[i]) + Math.PI/2; // along features
    const tr=jxx[i]+jyy[i], det=Math.sqrt(Math.max(0,(jxx[i]-jyy[i])**2+4*jxy[i]*jxy[i]));
    coh[i]= tr>1e-6 ? det/tr : 0;
  }

  // --- geometric prior (mask canvas at grid res, numeric feather) ---
  const mcv=document.createElement('canvas'); mcv.width=gw; mcv.height=gh;
  const mx=mcv.getContext('2d',{willReadFrequently:true});
  mx.fillStyle='#000'; mx.fillRect(0,0,gw,gh); mx.fillStyle='#fff';
  const ovalG=IDX.oval.map(Lg);
  const cGx=ovalG.reduce((s,p)=>s+p.x,0)/ovalG.length,
        cGy=ovalG.reduce((s,p)=>s+p.y,0)/ovalG.length;
  const eR=Lg(IDX.irisR), eL=Lg(IDX.irisL);
  const roll=Math.atan2(eL.y-eR.y, eL.x-eR.x);
  const fwG=fw*gs, fhG=fh*gs;
  const poly=(pts,sc)=>{ mx.beginPath();
    pts.forEach((p,i)=>{ const X=cGx+(p.x-cGx)*sc, Y=cGy+(p.y-cGy)*sc;
      i?mx.lineTo(X,Y):mx.moveTo(X,Y); });
    mx.closePath(); mx.fill(); };
  poly(ovalG,1.14);
  // hair volume
  mx.save(); mx.translate(cGx,cGy-0.34*fhG); mx.rotate(roll);
  mx.beginPath(); mx.ellipse(0,0, 1.18*fwG*.5*2, 0.98*fhG*.5*2, 0,0,TAU); mx.fill();
  mx.restore();
  // side hair / ears band
  mx.save(); mx.translate(cGx,cGy); mx.rotate(roll);
  mx.beginPath(); mx.ellipse(0,0, fwG*0.92, fhG*0.72, 0,0,TAU); mx.fill();
  mx.restore();
  // neck + shoulders
  const jaw=Lg(152);
  mx.beginPath();
  mx.moveTo(jaw.x-0.42*fwG, jaw.y-0.1*fhG);
  mx.lineTo(jaw.x+0.42*fwG, jaw.y-0.1*fhG);
  mx.lineTo(jaw.x+1.6*fwG, gh); mx.lineTo(jaw.x-1.6*fwG, gh);
  mx.closePath(); mx.fill();
  let geo=new Float32Array(N);
  { const md=mx.getImageData(0,0,gw,gh).data;
    for(let i=0;i<N;i++) geo[i]=md[i*4]/255; }
  geo=boxBlur(geo,gw,gh,3,2);

  // hard face oval (always subject)
  mx.fillStyle='#000'; mx.fillRect(0,0,gw,gh); mx.fillStyle='#fff';
  poly(ovalG,1.02);
  let ovalM=new Float32Array(N);
  { const md=mx.getImageData(0,0,gw,gh).data;
    for(let i=0;i<N;i++) ovalM[i]=md[i*4]/255; }
  ovalM=boxBlur(ovalM,gw,gh,2,1);

  // --- photometric subject likelihood + presence ---
  const pres=new Float32Array(N);
  for(let i=0;i<N;i++){
    const d=Math.hypot(R[i]-bgc[0],G[i]-bgc[1],B[i]-bgc[2])/1.7321;
    let pho=sstep(0.085,0.24,d);
    pho=clamp(pho + 0.7*sstep(0.05,0.18,mag[i]),0,1);   // texture rescues hair≈bg
    pres[i]=Math.max(ovalM[i], geo[i]*pho);
  }
  boxBlur(pres,gw,gh,1,1);

  // --- tone: percentile stretch inside subject ---
  const samp=[];
  for(let i=0;i<N;i+=3) if(pres[i]>0.4) samp.push(lum[i]);
  samp.sort((a,b)=>a-b);
  const p05=samp[Math.floor(samp.length*.04)]??0,
        p90=samp[Math.floor(samp.length*.92)]??1;
  const D=new Float32Array(N);
  for(let i=0;i<N;i++){
    const t=clamp((lum[i]-p05)/Math.max(1e-4,(p90-p05)),0,1);
    let d=Math.pow(1-t,1.35)*pres[i];
    d=Math.max(d, 0.05*ovalM[i]);          // faint wisps on bare skin
    D[i]=clamp(d,0,1);
  }

  // --- feature splats (density priors, never outlines) ---
  const splat=(g,amt,rad)=>{
    const r=Math.ceil(rad);
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
      const xx=Math.round(g.x+dx), yy=Math.round(g.y+dy);
      if(xx<0||yy<0||xx>=gw||yy>=gh) continue;
      const f=Math.exp(-(dx*dx+dy*dy)/(rad*rad*.55));
      const i=yy*gw+xx; D[i]=clamp(D[i]+amt*f,0,1.15);
    }
  };
  const eyeW=Math.hypot(Lg(133).x-Lg(33).x, Lg(133).y-Lg(33).y);
  for(const i of [IDX.irisR,IDX.irisL]) splat(Lg(i), .55, eyeW*.30);
  for(const i of [...IDX.lidR,...IDX.lidL]) splat(Lg(i), .16, eyeW*.14);
  for(const i of [...IDX.browR,...IDX.browL]) splat(Lg(i), .30, eyeW*.20);
  for(const i of [IDX.nostrilR,IDX.nostrilL]) splat(Lg(i), .30, eyeW*.13);
  splat(Lg(IDX.noseBase), .16, eyeW*.13);
  for(let k=0;k<IDX.lipU.length;k++){
    const a=Lg(IDX.lipU[k]), b=Lg(IDX.lipD[k]);
    splat({x:(a.x+b.x)/2,y:(a.y+b.y)/2}, .42, eyeW*.11);
  }
  splat(Lg(IDX.underLip), .18, eyeW*.16);

  return { gw,gh,gs, cx0,cy0, lum,D,pres,theta,coh,mag, ovalM,
           g2f, f2g, Lg, fw,fh, faceC:{x:cGx,y:cGy}, roll, eyeW, bgc };
}

/* ============================================================
   7. ENGINE — the scribble
============================================================ */
function generate(cap){
  const F=buildField(cap);
  const {gw,gh}=F;

  // ---- layout: grid -> art space -------------------------------
  const eR=F.Lg(IDX.irisR), eL=F.Lg(IDX.irisL);
  const eyeMid={x:(eR.x+eL.x)/2,y:(eR.y+eL.y)/2};
  // sc = art px per grid cell: face height -> 34.5% of H, width <= 46% of W
  const sc = Math.min( 0.345*H/(F.fh*F.gs), 0.46*W/(F.fw*F.gs) );
  // place eyes on the upper-third line, but keep the crop top on-canvas
  let eyesY = Math.max(0.40*H, 0.02*H + eyeMid.y*sc);
  eyesY = Math.min(eyesY, 0.47*H);
  const g2a=(gx,gy)=>({
    x: W/2 + (gx-eyeMid.x)*sc,
    y: eyesY + (gy-eyeMid.y)*sc,
  });
  const cellPx = sc;                       // art px per grid cell
  const wS = clamp(Math.min(W,H)/REF_MIN, .6, 2.4);  // width scale
  const headC = g2a(F.faceC.x, F.faceC.y);
  const headR = (Math.max(F.fw,F.fh)*F.gs*sc)*0.72;

  // ---- err buffer ----------------------------------------------
  const N=gw*gh;
  const err=Float32Array.from(F.D);
  let S0=0; for(let i=0;i<N;i++) S0+=err[i];

  const deposit=(x,y,amt,rad)=>{
    const r=Math.ceil(rad);
    const xi=Math.round(x), yi=Math.round(y);
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
      const xx=xi+dx, yy=yi+dy;
      if(xx<0||yy<0||xx>=gw||yy>=gh) continue;
      const f=Math.exp(-(dx*dx+dy*dy)/(rad*rad*.7));
      const i=yy*gw+xx; err[i]=Math.max(0, err[i]-amt*f);
    }
  };
  const errAt =(x,y)=>bilin(err ,gw,gh,x,y);
  const presAt=(x,y)=>bilin(F.pres,gw,gh,x,y);
  const flowAt=(x,y)=>bilin(F.theta,gw,gh,x,y);
  const cohAt =(x,y)=>bilin(F.coh ,gw,gh,x,y);

  function seedMax(minv){
    let best=-1,bx=0,by=0;
    for(let k=0;k<80;k++){
      const x=rnd()*gw, y=rnd()*gh;
      const e=errAt(x,y)*(0.4+0.6*presAt(x,y));
      if(e>best){best=e;bx=x;by=y;}
    }
    return best>=minv ? {x:bx,y:by,e:best} : null;
  }

  const strokes=[];
  function pushStroke(pts, width, alpha, pass){
    if(pts.length<4) return;
    // light smoothing (1 Chaikin pass keeps energy)
    const sm=[pts[0]];
    for(let i=0;i<pts.length-1;i++){
      const a=pts[i],b=pts[i+1];
      sm.push([a[0]*.75+b[0]*.25, a[1]*.75+b[1]*.25, a[2]]);
      sm.push([a[0]*.25+b[0]*.75, a[1]*.25+b[1]*.75, b[2]]);
    }
    sm.push(pts[pts.length-1]);
    let len=0;
    for(let i=1;i<sm.length;i++) len+=Math.hypot(sm[i][0]-sm[i-1][0], sm[i][1]-sm[i-1][1]);
    strokes.push({pts:sm, width, alpha, len, pass});
  }

  // ---- generic tonal walk --------------------------------------
  function walk(seed, o){
    const pts=[];
    let x=seed.x+rr(-.5,.5), y=seed.y+rr(-.5,.5);
    let th=flowAt(x,y)+ (rnd()<.5?0:Math.PI) + rr(-.4,.4);
    let om=rr(-o.om,o.om)*.5;
    let low=0, out=0;
    const nseed=(rnd()*1e4)|0;
    const maxN=Math.round(rr(o.len*.55,o.len));
    for(let n=0;n<maxN;n++){
      // darkness pull: probe fan
      let pvx=0,pvy=0;
      for(let k=-2;k<=2;k++){
        const a=th+k*.5, pr=o.probe;
        const e=errAt(x+Math.cos(a)*pr, y+Math.sin(a)*pr);
        pvx+=Math.cos(a)*e; pvy+=Math.sin(a)*e;
      }
      const pm=Math.hypot(pvx,pvy);
      if(pm>1e-5){pvx/=pm;pvy/=pm;}
      // flow alignment
      let ph=flowAt(x,y);
      if(Math.cos(ph-th)<0) ph+=Math.PI;
      const c=cohAt(x,y);
      // loop bias
      om += (vnoise(n*.07,nseed,3)-.5)*o.omJ;
      om *= .975;
      if(rnd()<.015) om=-om*.85;
      const le=errAt(x,y);
      const omLoc=om*(.6+1.1*le);
      // combine heading
      const vx=Math.cos(th)*o.m + Math.cos(ph)*o.fw*c + pvx*o.pw*(0.4+le);
      const vy=Math.sin(th)*o.m + Math.sin(ph)*o.fw*c + pvy*o.pw*(0.4+le);
      th=Math.atan2(vy,vx)+omLoc;
      x+=Math.cos(th)*o.step; y+=Math.sin(th)*o.step;
      if(x<-2||y<-2||x>gw+2||y>gh+2) break;
      const pr=presAt(x,y);
      out = pr<0.06 ? out+1 : 0;
      if(out>4) break;
      low = le<0.045 ? low+1 : 0;
      if(low>9 && n>o.len*.3) break;
      deposit(x,y,o.amt,o.rad);
      const a=g2a(x,y);
      const wnoise=.7+.6*vnoise(n*.15,nseed,9);
      const taper=Math.min(1, n/5, (maxN-n)/5);
      pts.push([a.x, a.y, o.w*wS*wnoise*(0.35+0.65*taper)]);
    }
    pushStroke(pts,o.w*wS,o.alpha,o.pass);
  }

  // ---- pass 0: gesture ------------------------------------------
  // boundary seeds
  const bcells=[];
  for(let y=1;y<gh-1;y++)for(let x=1;x<gw-1;x++){
    const i=y*gw+x;
    if(F.pres[i]>0.45 && (F.pres[i-1]<0.3||F.pres[i+1]<0.3||F.pres[i-gw]<0.3||F.pres[i+gw]<0.3))
      bcells.push({x,y});
  }
  const nb=bcells.length;
  for(let k=0;k<10 && nb;k++){
    const b=bcells[(rnd()*nb)|0];
    walk({x:b.x,y:b.y},{m:.7,fw:.6,pw:.12,om:.14,omJ:.05,step:1.6,probe:3,
         len:150,amt:.05,rad:2.0,w:2.1,alpha:.5,pass:0});
  }

  // ---- pass 1+2: midtones then darks -----------------------------
  const runTonal=(stopFrac,o,cap)=>{
    let n=0;
    while(n<cap){
      let S=0; if((n&15)===0){ for(let i=0;i<N;i++) S+=err[i]; if(S<stopFrac*S0) break; }
      const sd=seedMax(0.10);
      if(!sd) break;
      walk(sd,o); n++;
    }
  };
  runTonal(0.52,{m:.6,fw:.42,pw:.5,om:.34,omJ:.12,step:1.3,probe:2.6,
                 len:120,amt:.15,rad:1.6,w:1.65,alpha:.8,pass:1},330);
  runTonal(0.105,{m:.52,fw:.46,pw:.55,om:.5,omJ:.16,step:1.22,probe:2.2,
                 len:150,amt:.14,rad:1.45,w:1.3,alpha:.86,pass:2},640);

  // ---- pass 3: feature accents (scribbly, never clean) -----------
  const jit=(p,a)=>[p.x+rr(-a,a), p.y+rr(-a,a)];
  function accentPolyline(ptsA, w, alpha, passes=2, wob=1){
    for(let p=0;p<passes;p++){
      const pts=[];
      const ph=rnd()*10, off=rr(-.6,.6)*wS;
      for(let i=0;i<ptsA.length;i++){
        const t=i/(ptsA.length-1);
        const taper=Math.min(1,i/2,(ptsA.length-1-i)/2);
        pts.push([ptsA[i][0]+off+Math.sin(t*9+ph)*wob*wS,
                  ptsA[i][1]+Math.cos(t*7+ph)*wob*wS*.8,
                  w*wS*(0.4+0.6*taper)*rr(.8,1.15)]);
      }
      pushStroke(pts,w*wS,alpha,3);
    }
  }
  const resampleIdx=(list,n)=>{ // grid pts -> art pts, resampled
    const g=list.map(i=>F.Lg(i)).map(p=>g2a(p.x,p.y));
    const out=[];
    for(let k=0;k<n;k++){
      const t=k/(n-1)*(g.length-1), i=Math.min(g.length-2,t|0), f=t-i;
      out.push([lerp(g[i].x,g[i+1].x,f), lerp(g[i].y,g[i+1].y,f)]);
    }
    return out;
  };
  const eyeWA=F.eyeW*cellPx;   // eye width in art px
  // lids + corner flicks
  for(const lid of [IDX.lidR, IDX.lidL]){
    const p=resampleIdx(lid,14);
    // outer flick
    const o=p[0], o2=p[1];
    const dx=o[0]-o2[0], dy=o[1]-o2[1], m=Math.hypot(dx,dy)||1;
    p.unshift([o[0]+dx/m*eyeWA*.22, o[1]+dy/m*eyeWA*.22+eyeWA*.05]);
    accentPolyline(p,1.55,.9,2,.8);
  }
  // iris spirals
  for(const [ci,ring] of [[IDX.irisR,IDX.irisRing],[IDX.irisL,IDX.irisRingL]]){
    const c=F.Lg(ci), ca=g2a(c.x,c.y);
    let r=0; for(const i of ring){ const p=F.Lg(i); r+=Math.hypot(p.x-c.x,p.y-c.y); }
    r=(r/ring.length)*cellPx;
    const pts=[]; const turns=2.4, n=46, ph=rnd()*TAU;
    for(let k=0;k<n;k++){
      const t=k/(n-1);
      const rad=r*(0.3+0.68*t)*(1+.12*Math.sin(t*20));
      const a=ph+t*turns*TAU;
      pts.push([ca.x+Math.cos(a)*rad, ca.y+Math.sin(a)*rad*.92,
                1.5*wS*(.5+.5*Math.min(1,k/3,(n-1-k)/3))]);
    }
    pushStroke(pts,1.5*wS,.92,3);
  }
  // brows: bundles of short directional strokes
  for(const brow of [IDX.browR, IDX.browL]){
    const base=resampleIdx(brow,10);
    for(let k=0;k<5;k++){
      const a=rr(0,.45), b=rr(.55,1);
      const i0=Math.floor(a*(base.length-1)), i1=Math.ceil(b*(base.length-1));
      const seg=base.slice(i0,i1+1).map(p=>[p[0]+rr(-1,1)*wS, p[1]+rr(-2.4,2.4)*wS]);
      accentPolyline(seg,1.45,.85,1,.6);
    }
  }
  // lip seam + corner knots + under-lip
  {
    const seam=[];
    for(let k=0;k<IDX.lipU.length;k++){
      const a=F.Lg(IDX.lipU[k]), b=F.Lg(IDX.lipD[k]);
      const p=g2a((a.x+b.x)/2,(a.y+b.y)/2); seam.push([p.x,p.y]);
    }
    accentPolyline(seam,1.6,.9,2,.7);
    for(const ci of [0, IDX.lipU.length-1]){
      const c=seam[ci], pts=[];
      for(let k=0;k<26;k++){ const t=k/25, a=t*2.2*TAU;
        const rad=eyeWA*.075*(1-.4*t);
        pts.push([c[0]+Math.cos(a)*rad, c[1]+Math.sin(a)*rad, 1.3*wS]); }
      pushStroke(pts,1.3*wS,.85,3);
    }
    const u=F.Lg(IDX.underLip), ua=g2a(u.x,u.y);
    const pts=[];
    for(let k=0;k<12;k++){ const t=k/11;
      pts.push([ua.x+(t-.5)*eyeWA*.9, ua.y+eyeWA*.22 - Math.sin(t*Math.PI)*eyeWA*.10,
                1.35*wS*(.5+.5*Math.min(1,k/2,(11-k)/2))]); }
    pushStroke(pts,1.35*wS,.6,3);
    // nostril hooks
    for(const [ni,sgn] of [[IDX.nostrilR,-1],[IDX.nostrilL,1]]){
      const nP=F.Lg(ni), na=g2a(nP.x,nP.y), pts=[];
      for(let k=0;k<12;k++){ const t=k/11, a=Math.PI*.5+sgn*(t*1.9-0.4);
        pts.push([na.x+Math.cos(a)*eyeWA*.14*sgn, na.y+Math.sin(a)*eyeWA*.14-eyeWA*.05,
                  1.35*wS*(.5+.5*Math.min(1,k/2,(11-k)/2))]); }
      pushStroke(pts,1.35*wS,.8,3);
    }
  }

  // ---- pass 4: stray energy lines (art space) --------------------
  const strayN=Math.round(rr(14,20));
  for(let k=0;k<strayN && nb;k++){
    // seeds biased to top hair + shoulders
    let b;
    for(let t=0;t<12;t++){ b=bcells[(rnd()*nb)|0];
      const rel=(b.y - F.faceC.y)/(F.fh*F.gs);
      if(rel<-.2 || rel>0.75) break; }
    const p0=g2a(b.x,b.y);
    // outward normal via presence gradient
    const e=1.5;
    const nx=presAt(b.x-e,b.y)-presAt(b.x+e,b.y),
          ny=presAt(b.x,b.y-e)-presAt(b.x,b.y+e);
    let th=Math.atan2(ny,nx)+rr(-.7,.7);
    let x=p0.x, y=p0.y;
    let om=rr(-.09,.09);
    const looper=rnd()<.32;
    const step=5*wS;
    const maxN=Math.round(rr(70,190));
    const pts=[];
    const ns=(rnd()*1e4)|0;
    for(let n=0;n<maxN;n++){
      om+=(vnoise(n*.05,ns,4)-.5)*(looper?.09:.03);
      om*= looper? .995 : .985;
      // arc around the head
      const rx=x-headC.x, ry=y-headC.y, rm=Math.hypot(rx,ry)||1;
      const tx=-ry/rm, ty=rx/rm;
      const orbit = Math.cos(th)*tx+Math.sin(th)*ty>0?1:-1;
      const pull = rm>headR*1.85 ? 0.25 : (rm<headR*1.05? -0.12 : 0);
      const vx=Math.cos(th)*.86 + tx*orbit*.18 + (-rx/rm)*pull;
      const vy=Math.sin(th)*.86 + ty*orbit*.18 + (-ry/rm)*pull;
      th=Math.atan2(vy,vx)+om*(looper?2.4:1);
      x+=Math.cos(th)*step; y+=Math.sin(th)*step;
      if(x<-40||y<-40||x>W+40||y>H+40) break;
      const taper=Math.min(1,n/4,(maxN-n)/8);
      pts.push([x,y,1.35*wS*(.4+.6*taper)*rr(.8,1.1)]);
    }
    pushStroke(pts,1.35*wS,.66,4);
  }

  // ---- pass 5: signature -----------------------------------------
  {
    const len=clamp(W*.15, 90*wS, 220*wS);
    const x1=W - Math.max(0.055*W, 26*wS) ;
    const x0=x1-len;
    const y0=H - Math.max(0.065*H, 56*wS) - 8*wS;
    const pts=[]; const ph=rnd()*TAU;
    const NL=110;
    let loopAt=[rr(.2,.4), rr(.55,.8)];
    for(let k=0;k<NL;k++){
      const t=k/(NL-1);
      let x=x0+len*t + Math.sin(t*40+ph)*1.2*wS;
      let y=y0 + Math.sin(t*TAU*3.1+ph)*6.5*wS + Math.sin(t*TAU*7.3+ph*2)*2.6*wS;
      pts.push([x,y, 1.5*wS*(.45+.55*Math.min(1,k/4,(NL-1-k)/4))]);
      for(const la of loopAt){
        if(Math.abs(t-la)<0.004){
          const r=rr(3.5,6.5)*wS, ca=rnd()*TAU;
          for(let q=1;q<=14;q++){ const a=ca+q/14*TAU;
            pts.push([x+Math.cos(a)*r-Math.cos(ca)*r, y+Math.sin(a)*r-Math.sin(ca)*r, 1.4*wS]); }
        }
      }
    }
    pushStroke(pts,1.5*wS,.95,5);
    // underline flick
    const up=[];
    for(let k=0;k<16;k++){ const t=k/15;
      up.push([x0-4*wS+ (len*1.08)*t, y0+9.5*wS - Math.sin(t*Math.PI)*2.2*wS,
               1.9*wS*(.4+.6*Math.min(1,k/2,(15-k)/2))]); }
    pushStroke(up,1.9*wS,.9,5);
  }

  // total length + order (generation order is the narrative)
  let total=0; for(const st of strokes) total+=st.len;
  return { strokes, W, H, totalLen:total, headC, headR };
}

/* ============================================================
   8. INK RENDERING (incremental + full replay)
============================================================ */
function makeInk(){
  inkCv=document.createElement('canvas');
  inkCv.width=art.W; inkCv.height=art.H;
  inkCtx=inkCv.getContext('2d');
  inkCtx.lineCap='round'; inkCtx.lineJoin='round';
}
function drawSegs(ctx, st, i0, i1, k=1, ox=0, oy=0){
  ctx.strokeStyle=rgba(pal.ink, st.alpha);
  const p=st.pts;
  for(let i=Math.max(1,i0); i<=i1; i++){
    ctx.beginPath();
    ctx.moveTo(p[i-1][0]*k+ox, p[i-1][1]*k+oy);
    ctx.lineTo(p[i][0]*k+ox,   p[i][1]*k+oy);
    ctx.lineWidth=Math.max(.4, p[i][2]*k);
    ctx.stroke();
  }
}
function reink(ctx=inkCtx, k=1, ox=0, oy=0){
  ctx.clearRect(0,0,art.W*k,art.H*k);
  for(const st of art.strokes) drawSegs(ctx,st,1,st.pts.length-1,k,ox,oy);
}

/* ============================================================
   9. ANIMATION
============================================================ */
function startDraw(){
  makeInk();
  state='drawing';
  const totalRef = art.totalLen * (REF_MIN/Math.min(W,H));
  const dur = INSTANT||reduced ? 0 : clamp(totalRef/10500, 3.5, 6.2);
  if(dur===0){
    reink(); state='done'; composite(); showUI(true);
    window.__scrawlDone=true;
    return;
  }
  anim={ si:0, pi:1, drawn:0, speed:art.totalLen/dur, last:performance.now() };
  requestAnimationFrame(tick);
}
function tick(now){
  if(state!=='drawing') return;
  const dt=Math.min(0.05,(now-anim.last)/1000); anim.last=now;
  let budget=anim.speed*dt;
  let tip=null;
  while(budget>0 && anim.si<art.strokes.length){
    const st=art.strokes[anim.si], p=st.pts;
    if(anim.pi>=p.length){ anim.si++; anim.pi=1; continue; }
    const segLen=Math.hypot(p[anim.pi][0]-p[anim.pi-1][0], p[anim.pi][1]-p[anim.pi-1][1]);
    drawSegs(inkCtx, st, anim.pi, anim.pi);
    budget-=segLen;
    tip={x:p[anim.pi][0], y:p[anim.pi][1]};
    anim.pi++;
  }
  composite(tip);
  if(anim.si>=art.strokes.length){
    state='done'; composite(); showUI(true);
    window.__scrawlDone=true;
  } else requestAnimationFrame(tick);
}

/* ============================================================
   10. UI
============================================================ */
function buildUI(){
  for(const p of PALETTES){
    const b=document.createElement('button');
    b.className='dot'; b.dataset.name=p.name;
    b.style.setProperty('--dp',p.paper); b.style.setProperty('--di',p.ink);
    b.setAttribute('aria-label',p.name+' palette');
    b.setAttribute('aria-pressed', p===pal?'true':'false');
    b.onclick=()=>setPalette(p);
    dotsEl.appendChild(b);
  }
  document.getElementById('save').onclick=savePNG;
  document.getElementById('clear').onclick=clearArt;
  addEventListener('keydown',e=>{
    if(state!=='done') return;
    if(e.key==='s'||e.key==='S') savePNG();
    if(e.key==='c'||e.key==='C') clearArt();
  });
}
function showUI(on){
  pill.classList.toggle('show',on);
  pill.setAttribute('aria-hidden', on?'false':'true');
}
function savePNG(){
  if(!art) return;
  try{
    const k=Math.max(1, 2048/Math.max(art.W,art.H));
    const oW=Math.round(art.W*k), oH=Math.round(art.H*k);
    const c=document.createElement('canvas'); c.width=oW; c.height=oH;
    const x=c.getContext('2d');
    // paper at export size
    x.fillStyle=pal.paper; x.fillRect(0,0,oW,oH);
    const pat=x.createPattern(grainTile,'repeat');
    x.save(); x.scale(k,k);
    x.globalCompositeOperation='multiply'; x.globalAlpha=.055;
    x.fillStyle=pat; x.fillRect(0,0,art.W,art.H);
    x.globalCompositeOperation='screen'; x.globalAlpha=.05;
    x.fillRect(0,0,art.W,art.H); x.restore();
    const g=x.createRadialGradient(oW/2,oH*.46,Math.min(oW,oH)*.42, oW/2,oH*.5,Math.hypot(oW,oH)*.62);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,rgba(pal.ink,.07));
    x.fillStyle=g; x.fillRect(0,0,oW,oH);
    x.lineCap='round'; x.lineJoin='round';
    for(const st of art.strokes) drawSegs(x,st,1,st.pts.length-1,k);
    c.toBlob(bl=>{
      const a=document.createElement('a');
      const d=new Date(), z=n=>String(n).padStart(2,'0');
      a.download=`scrawl-${d.getFullYear()}${z(d.getMonth()+1)}${z(d.getDate())}-${z(d.getHours())}${z(d.getMinutes())}${z(d.getSeconds())}.png`;
      a.href=URL.createObjectURL(bl);
      a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    },'image/png');
  }catch(e){ msg('could not save — try again'); setTimeout(()=>msg(''),2500); }
}
function clearArt(){
  art=null; inkCv=null; anim=null;
  showUI(false); composite();
  rearmAt=performance.now()+REARM_MS;
  hist=[]; steadySince=0;
  state='watch';
  window.__scrawlDone=false;
  if(DEBUG) setTimeout(()=>{ if(state==='watch'){ state='generating'; debugStart(); } }, REARM_MS);
}

/* ============================================================
   11. CAMERA + DETECTION
============================================================ */
async function initLive(){
  // camera
  let stream;
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
  }catch(e){
    state='error';
    msg(location.protocol==='file:'
      ? 'camera was blocked here\nserve the file:  python3 -m http.server\nthen open  localhost:8000'
      : 'camera access is needed — allow it and reload');
    return;
  }
  video.srcObject=stream;
  try{ await video.play(); }catch(e){}
  stream.getVideoTracks()[0]?.addEventListener('ended',()=>{
    state='error'; msg('camera disconnected — reload to start again');
  });

  // model
  const slow=setTimeout(()=>{ if(state==='boot')
    msg('warming up — first open fetches the face model'); },5000);
  try{
    const mod=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14');
    const files=await mod.FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
    const make=(delegate)=>mod.FaceLandmarker.createFromOptions(files,{
      baseOptions:{ modelAssetPath:
        'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate },
      runningMode:'VIDEO', numFaces:2 });
    try{ landmarker=await make('GPU'); }
    catch(e){ landmarker=await make('CPU'); }
  }catch(e){
    clearTimeout(slow); state='error';
    msg('first open needs internet to fetch the face model\nreconnect and reload');
    return;
  }
  clearTimeout(slow); msg('');
  state='watch';
  watchLoop();
}

function watchLoop(){
  clearTimeout(watchTimer);
  watchTimer=setTimeout(watchLoop, 66);   // ~15 fps
  if(state!=='watch' || document.hidden) return;
  if(!video.videoWidth || video.readyState<2) return;
  if(performance.now()<rearmAt) return;

  const now=performance.now();
  let res;
  try{ res=landmarker.detectForVideo(video, now); }catch(e){ return; }
  const faces=res?.faceLandmarks||[];
  if(!faces.length){ hist=[]; steadySince=0; return; }

  // largest face
  let best=null, bestA=-1;
  for(const f of faces){
    let x0=1,y0=1,x1=0,y1=0;
    for(const i of IDX.oval){ const p=f[i];
      x0=Math.min(x0,p.x); x1=Math.max(x1,p.x);
      y0=Math.min(y0,p.y); y1=Math.max(y1,p.y); }
    const a=(x1-x0)*(y1-y0);
    if(a>bestA){bestA=a; best={f, x0,y0,x1,y1};}
  }
  const fh=best.y1-best.y0;
  if(fh<MIN_FACE_H){ hist=[]; steadySince=0; return; }

  const cx=(best.x0+best.x1)/2, cy=(best.y0+best.y1)/2;
  hist.push({t:now,cx,cy,fh});
  hist=hist.filter(h=>now-h.t<=STEADY_MS+80);
  if(!steadySince) steadySince=now;

  // movement check over the window
  let mind=1,maxd=0,minx=1,maxx=0,miny=1,maxy=0;
  for(const h of hist){ minx=Math.min(minx,h.cx);maxx=Math.max(maxx,h.cx);
    miny=Math.min(miny,h.cy);maxy=Math.max(maxy,h.cy);
    mind=Math.min(mind,h.fh);maxd=Math.max(maxd,h.fh); }
  const move=Math.hypot(maxx-minx,maxy-miny);
  if(move>0.07*fh || (maxd-mind)>0.12*fh){ steadySince=now; return; }
  if(now-steadySince<STEADY_MS) return;

  capture(best.f);
}

function capture(lmArr){
  state='generating';
  // mirrored frame
  const vw=video.videoWidth, vh=video.videoHeight;
  const capW=Math.min(960,vw), capH=Math.round(vh*capW/vw);
  const cv=document.createElement('canvas'); cv.width=capW; cv.height=capH;
  const x=cv.getContext('2d');
  x.translate(capW,0); x.scale(-1,1);
  x.drawImage(video,0,0,capW,capH);
  const lm=i=>{ const p=lmArr[i]||{x:.5,y:.5}; return {x:1-p.x, y:p.y}; };
  runPipeline({cv, cw:capW, ch:capH, lm});
}

function runPipeline(cap){
  // generate can take ~100-250ms; yield a frame first
  requestAnimationFrame(()=>{
    try{ art=generate(cap); }
    catch(e){ console.error(e); state='watch'; return; }
    startDraw();
  });
}

/* ============================================================
   12. DEBUG — synthetic sitter (offline visual testing)
============================================================ */
function debugStart(){
  const fw=720, fh=960;
  const cv=document.createElement('canvas'); cv.width=fw; cv.height=fh;
  const x=cv.getContext('2d');
  const variant=Q.get('hair')||'long';
  const glasses=Q.has('glasses');

  // wall
  const wg=x.createLinearGradient(0,0,fw,fh);
  wg.addColorStop(0,'#cdc6ba'); wg.addColorStop(1,'#bfb7ab');
  x.fillStyle=wg; x.fillRect(0,0,fw,fh);

  const cx=360, ft=250, fH=310, fW=214;
  const cyF=ft+fH/2;

  // shoulders / shirt
  x.fillStyle='#6d7278';
  x.beginPath();
  x.moveTo(cx-260,fh); x.lineTo(cx-150,ft+fH+60);
  x.quadraticCurveTo(cx,ft+fH+10,cx+150,ft+fH+60);
  x.lineTo(cx+260,fh); x.closePath(); x.fill();
  // neck
  x.fillStyle='#c99a75';
  x.fillRect(cx-42,ft+fH-40,84,110);
  x.fillStyle='rgba(60,35,20,.35)';
  x.fillRect(cx-42,ft+fH-40,84,34);

  // hair behind
  x.fillStyle='#241a12';
  if(variant==='curly'){
    for(let k=0;k<11;k++){
      const a=k/11*TAU;
      x.beginPath();
      x.ellipse(cx+Math.cos(a)*130, cyF-70+Math.sin(a)*120*.8,
                rr(55,88), rr(55,88), rr(0,3),0,TAU);
      x.fill();
    }
  }else if(variant==='short'){
    x.beginPath(); x.ellipse(cx,ft+40,fW*.62,120,0,0,TAU); x.fill();
  }else{ // long
    x.beginPath(); x.ellipse(cx,cyF-70,fW*.78,fH*.62,0,0,TAU); x.fill();
    x.beginPath(); x.ellipse(cx-135,cyF+110,52,190,-.12,0,TAU); x.fill();
    x.beginPath(); x.ellipse(cx+138,cyF+100,48,200,.15,0,TAU); x.fill();
    // strand texture
    x.strokeStyle='rgba(90,62,38,.5)'; x.lineWidth=3;
    for(let k=0;k<26;k++){
      x.beginPath();
      const sx=cx+rr(-150,150), sy=ft-rr(20,90);
      x.moveTo(sx,sy);
      x.quadraticCurveTo(sx+rr(-40,40), sy+rr(120,220), sx+rr(-70,70), sy+rr(260,420));
      x.stroke();
    }
  }

  // face
  x.fillStyle='#d9b08c';
  x.beginPath(); x.ellipse(cx,cyF,fW/2,fH/2,0,0,TAU); x.fill();
  // side shading
  const sh=x.createLinearGradient(cx-fW/2,0,cx+fW/2,0);
  sh.addColorStop(0,'rgba(70,40,25,.42)'); sh.addColorStop(.28,'rgba(70,40,25,0)');
  sh.addColorStop(.75,'rgba(70,40,25,0)'); sh.addColorStop(1,'rgba(70,40,25,.34)');
  x.fillStyle=sh;
  x.beginPath(); x.ellipse(cx,cyF,fW/2,fH/2,0,0,TAU); x.fill();
  // forehead highlight
  const hl=x.createRadialGradient(cx-20,ft+80,10,cx-20,ft+80,120);
  hl.addColorStop(0,'rgba(255,240,220,.5)'); hl.addColorStop(1,'rgba(255,240,220,0)');
  x.fillStyle=hl; x.beginPath(); x.ellipse(cx,cyF,fW/2,fH/2,0,0,TAU); x.fill();
  if(variant!=='short'){ // fringe shadow
    x.fillStyle='rgba(36,26,18,.9)';
    x.beginPath(); x.ellipse(cx,ft+16,fW*.52,46,0,0,Math.PI,true); x.fill();
  }

  // features geometry
  const eyY=ft+128, eyDX=64, eyW2=27, eyH2=12;
  const nsY=ft+196, lpY=ft+242;

  for(const s of [-1,1]){
    const ex=cx+s*eyDX;
    // socket shadow
    x.fillStyle='rgba(80,45,30,.28)';
    x.beginPath(); x.ellipse(ex,eyY-2,eyW2+8,eyH2+8,0,0,TAU); x.fill();
    // white + iris
    x.fillStyle='#e8ddd0';
    x.beginPath(); x.ellipse(ex,eyY,eyW2,eyH2,0,0,TAU); x.fill();
    x.fillStyle='#3a2a1c'; x.beginPath(); x.arc(ex,eyY,10,0,TAU); x.fill();
    x.fillStyle='#120c08'; x.beginPath(); x.arc(ex,eyY,4.6,0,TAU); x.fill();
    // lid line
    x.strokeStyle='#2a1a10'; x.lineWidth=3.4;
    x.beginPath(); x.ellipse(ex,eyY-1,eyW2,eyH2,0,Math.PI*1.05,Math.PI*1.95); x.stroke();
    // brow
    x.strokeStyle='#241608'; x.lineWidth=7;
    x.beginPath();
    x.moveTo(ex-s*30,eyY-34);
    x.quadraticCurveTo(ex,eyY-46,ex+s*26,eyY-36);
    x.stroke();
    // nostril
    x.fillStyle='rgba(40,20,12,.85)';
    x.beginPath(); x.ellipse(cx+s*15,nsY,6,4,0,0,TAU); x.fill();
  }
  // nose side shadow
  x.strokeStyle='rgba(90,50,30,.4)'; x.lineWidth=8;
  x.beginPath(); x.moveTo(cx-8,eyY+14); x.quadraticCurveTo(cx-14,nsY-24,cx-12,nsY-4); x.stroke();
  // lips
  x.fillStyle='#a35f68';
  x.beginPath(); x.ellipse(cx,lpY,38,14,0,0,TAU); x.fill();
  x.fillStyle='rgba(70,25,30,.6)';
  x.beginPath(); x.ellipse(cx,lpY-3,38,6,0,0,TAU); x.fill();
  x.strokeStyle='#43181e'; x.lineWidth=3.5;
  x.beginPath(); x.moveTo(cx-36,lpY); x.quadraticCurveTo(cx,lpY+5,cx+36,lpY); x.stroke();
  // chin shadow
  x.fillStyle='rgba(80,45,28,.25)';
  x.beginPath(); x.ellipse(cx,lpY+34,30,9,0,0,TAU); x.fill();

  if(glasses){
    x.strokeStyle='#181310'; x.lineWidth=6;
    for(const s of [-1,1]){ x.beginPath(); x.arc(cx+s*eyDX,eyY,37,0,TAU); x.stroke(); }
    x.beginPath(); x.moveTo(cx-eyDX+37,eyY-4); x.quadraticCurveTo(cx,eyY-12,cx+eyDX-37,eyY-4); x.stroke();
    for(const s of [-1,1]){ x.beginPath(); x.moveTo(cx+s*(eyDX+37),eyY-2);
      x.lineTo(cx+s*(fW/2+8),eyY-14); x.stroke(); }
  }

  // ---- synth landmarks ----
  const M=new Map();
  const set=(i,X,Y)=>M.set(i,{x:X/fw,y:Y/fh});
  // oval ring, starts at top (index list order), clockwise on screen
  IDX.oval.forEach((id,k)=>{
    const a=-Math.PI/2 + k/IDX.oval.length*TAU;
    set(id, cx+Math.cos(a)*fW/2, cyF+Math.sin(a)*fH/2);
  });
  const eyeRing=(ids, ex)=>{
    // first 9 across the top outer->inner, then 7 under inner->outer
    const sgn = ex<cx ? 1 : -1; // direction of travel outer->inner
    for(let k=0;k<9;k++){ const t=k/8;
      set(ids[k], ex - sgn*eyW2 + sgn*2*eyW2*t, eyY - Math.sin(t*Math.PI)*eyH2); }
    for(let k=0;k<7;k++){ const t=(k+1)/8;
      set(ids[9+k], ex + sgn*eyW2 - sgn*2*eyW2*t, eyY + Math.sin(t*Math.PI)*eyH2); }
  };
  eyeRing(IDX.eyeR, cx-eyDX); eyeRing(IDX.eyeL, cx+eyDX);
  set(IDX.irisR, cx-eyDX, eyY); set(IDX.irisL, cx+eyDX, eyY);
  IDX.irisRing.forEach((id,k)=>{ const a=k/4*TAU; set(id, cx-eyDX+Math.cos(a)*10, eyY+Math.sin(a)*10); });
  IDX.irisRingL.forEach((id,k)=>{ const a=k/4*TAU; set(id, cx+eyDX+Math.cos(a)*10, eyY+Math.sin(a)*10); });
  const browRow=(ids,ex,s)=>{ ids.forEach((id,k)=>{ const t=k/(ids.length-1);
    set(id, ex - s*30 + s*58*t, eyY-34 - Math.sin(t*Math.PI)*11); }); };
  browRow(IDX.browR, cx-eyDX, 1); browRow(IDX.browL, cx+eyDX, -1);
  const lipRing=(ids,off)=>{ ids.forEach((id,k)=>{ const t=k/(ids.length-1);
    set(id, cx-36+72*t, lpY + off*Math.sin(t*Math.PI)*4 + (off<0?-2:2)); }); };
  lipRing(IDX.lipU,-1); lipRing(IDX.lipD,1);
  set(IDX.underLip, cx, lpY+15);
  set(IDX.noseBase, cx, nsY+6);
  set(IDX.nostrilR, cx-16, nsY); set(IDX.nostrilL, cx+16, nsY);
  set(152, cx, cyF+fH/2); // jaw bottom

  const lm=i=>M.get(i)||{x:cx/fw,y:cyF/fh};
  runPipeline({cv, cw:fw, ch:fh, lm});
}

/* ============================================================
   13. BOOT
============================================================ */
window.__scrawl={ get state(){return state;}, PALETTES };
window.__scrawlDone=false;
buildUI();
resize();
setPalette(pal);
document.addEventListener('visibilitychange',()=>{ /* watch loop self-gates */ });

if(DEBUG){
  state='generating';
  debugStart();
}else{
  initLive();
}
